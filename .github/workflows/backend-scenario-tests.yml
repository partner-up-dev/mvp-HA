name: Backend Scenario Tests

on:
  pull_request:
    branches:
      - master
      - develop
    paths:
      - "apps/backend/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".node-version"
      - ".github/workflows/backend-scenario-tests.yml"
  workflow_dispatch:

jobs:
  backend-scenario-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SCENARIO_DATABASE_ADMIN_URL: postgresql://postgres:postgres@localhost:5432/postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: Typecheck backend
        run: pnpm --filter @partner-up-dev/backend typecheck

      - name: Run backend unit tests
        run: pnpm test:backend:unit

      - name: Lint backend DB artifacts
        run: pnpm db:lint

      - name: Run backend scenario tests
        run: pnpm test:backend:scenario
