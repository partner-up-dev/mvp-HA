name: Frontend Gate

on:
  pull_request:
    branches:
      - master
      - develop
    paths:
      - "apps/frontend/**"
      - "apps/backend/src/**"
      - "vitest.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".node-version"
      - ".github/workflows/frontend-gate.yml"
  workflow_dispatch:

jobs:
  frontend-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend design tokens
        run: pnpm --filter @partner-up-dev/frontend lint:tokens:strict

      - name: Run frontend unit tests
        run: pnpm test:unit:frontend

      - name: Build frontend
        run: pnpm --filter @partner-up-dev/frontend build
